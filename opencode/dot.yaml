linux:
  links:
    opencode.json: ~/.config/opencode/opencode.json
    tui.json: ~/.config/opencode/tui.json
    package.json: ~/.config/opencode/package.json
  installs:
    cmd: |
      {{#if (eq whoami.distro "Manjaro Linux")}}
      ~/.local/bin/bun install -g opencode-ai
      cd ~/.config/opencode && ~/.local/bin/bun install
      {{/if}}
      {{#if (eq whoami.distro "Arch Linux")}}
      ~/.local/bin/bun install -g opencode-ai
      cd ~/.config/opencode && ~/.local/bin/bun install
      {{/if}}
      {{#if (eq whoami.distro "Arch Linux ARM")}}
      ~/.local/bin/bun install -g opencode-ai
      cd ~/.config/opencode && ~/.local/bin/bun install
      {{/if}}
      {{#if (eq whoami.distro "postmarketOS edge")}}
      ~/.local/bin/bun install -g opencode-ai
      ln -sf ~/.cache/.bun/install/global/node_modules/opencode-linux-arm64-musl/bin/opencode ~/.local/bin/opencode
      {{/if}}
      rotz link opencode --force
