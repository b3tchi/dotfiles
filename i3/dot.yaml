# i3 window manager — core WM + compositor
# Pair with quickshell or i3-classic for bar/launcher/notifications
# Note: alttab and xborder-git were previously installed here but are no
# longer used — alttab replaced by quickshell overlay switcher, xborders
# replaced by quickshell/xborders-patched (a local fork).
linux:
  links:
    config: ~/.i3/config
    i3status.conf: ~/.config/i3status/config
    i3blocks.conf: ~/.config/i3blocks/config
    scripts/qs-title-trim.sh: ~/.i3/scripts/qs-title-trim.sh
    scripts/clip-sync.sh: ~/.i3/scripts/clip-sync.sh
    # sp014 cross-display clipboard feeder — autostarted by config.d/native.conf
    # (linked on every platform; only the native overlay execs it)
    scripts/clip-feed.sh: ~/.i3/scripts/clip-feed.sh
    # WSL<->Windows clipboard bridge over interop (dotfiles-5pw) — autostarted
    # only by config.d/wsl.conf; exits 0 immediately where powershell.exe is absent
    scripts/clip-win-bridge.sh: ~/.i3/scripts/clip-win-bridge.sh
    picom.conf: ~/.config/picom.conf
    # Platform overlay (ft003 i3-config-layering): exactly one config.d/*
    # eval path check, not env.WSL_DISTRO_NAME — that var is unset in
    # sessions spawned outside wsl.exe (tmux server, sway/WSLg, ssh).
    {{#if (eval "test -d /mnt/c && echo wsl || true")}}
    config.d/wsl.conf: ~/.i3/config.d/wsl.conf
    {{else}}
    config.d/native.conf: ~/.i3/config.d/native.conf
    {{/if}}
  installs:
    cmd: |
      {{#if (eq whoami.distro "Manjaro Linux")}}
      # xclip: X11 clipboard tool — nvim's + register provider on i3/X11
      sudo pacman -Syu --needed --noconfirm i3 xclip
      pamac install --no-confirm autocutsel
      {{/if}}
      {{#if (eq whoami.distro "Arch Linux")}}
      # runtime WSL check (env.WSL_DISTRO_NAME unreliable, see links note)
      # xclip: X11 clipboard tool — nvim yank reaches the xrdp X11 CLIPBOARD
      # (then xrdp-chansrv → Windows). Without it nvim falls back to the idle
      # WSLg wayland-0 clipboard, which chansrv can't see (dotfiles-0ak).
      if [ -d /mnt/c ]; then
        sudo pacman -Syu --needed --noconfirm i3-wm xorg-xinput picom \
          python-gobject python-cairo xclip
      else
        sudo pacman -Syu --needed --noconfirm \
          i3-wm i3status i3blocks \
          picom xdotool xclip
      fi
      yay -S --needed --noconfirm autocutsel
      {{/if}}
      {{#if (eq whoami.distro "Arch Linux ARM")}}
      sudo pacman -Syu --needed --noconfirm \
        i3-wm i3status i3blocks \
        picom xdotool xclip
      yay -S --needed --noconfirm autocutsel
      {{/if}}
      rotz link i3 --force
