# Platform overlay: native linux + proot (ft003 i3-config-layering)
# Owns: $term, autostart execs, bar. Base config never execs.

## sound tray
exec --no-startup-id volumeicon

# wallpaper + compositor — glx on the console (:0, real GPU); xrender +
# --no-use-damage under xrdp (llvmpipe makes glx a CPU hog; damage
# tracking over xorgxrdp paints windows black — same as wsl.conf)
exec --no-startup-id sh -c 'nitrogen --restore; sleep 1; if [ -n "$XRDP_SESSION" ]; then picom -b --backend xrender --no-use-damage; else picom -b; fi'

# tray applications
exec --no-startup-id nm-applet
exec --no-startup-id xfce4-power-manage
exec --no-startup-id pamac-tray
exec --no-startup-id clipit
# rectangle screenshot — launch ksnip on demand (no tray autostart). Scoped
# qt6ct platformtheme gives it the dark Fusion palette + Iosevka UI font
# (ksnip/qt6ct.conf) without theming other Qt apps. Starting per-shortcut (vs
# a persistent tray instance) means each session captures on its OWN display:
# a shared single-instance server would otherwise steal an xrdp (:10) capture
# to the console (:0). Works on both native console and xrdp sessions.
bindsym $mod+Shift+s exec --no-startup-id env QT_QPA_PLATFORMTHEME=qt6ct ksnip -r

# lockscreen
exec --no-startup-id xautolock -time 10 -locker blurlock

# dvorak default layout
exec --no-startup-id setxkbmap -device $(xinput list --id-only 'keyboard:AT Translated Set 2 keyboard') -layout us -variant dvorak

# task switcher — action handled by quickshell via xinput key monitor
# (needs to track Super release for confirm; i3 bindsym fires on press only).
# i3 grabs the combos via `nop` so Tab/W don't leak through to the focused
# window (raw XI2 events used by the keymon are below the grab layer).
# Both modifiers named explicitly — NOT via $mod: in xrdp sessions $mod
# resolves to Mod1 and a $mod pair would duplicate the Mod1 lines
# ("Duplicate keybinding" nagbar on connect).
bindsym Mod4+Tab nop
bindsym Mod1+Tab nop
bindsym Mod4+w nop
bindsym Mod1+w nop
