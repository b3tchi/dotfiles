# Platform overlay: native linux + proot (ft003 i3-config-layering)
# Owns: $term, autostart execs, bar. Base config never execs.

## sound tray
exec --no-startup-id volumeicon

# wallpaper + compositor — glx on the console (:0, real GPU); xrender +
# --no-use-damage under xrdp (llvmpipe makes glx a CPU hog; damage
# tracking over xorgxrdp paints windows black — same as wsl.conf)
# picom only on the native session (inactive-dim aesthetic). xrdp runs
# WITHOUT a compositor: its picom existed solely to give the focus border
# ARGB alpha, but the border is shape-based now (qs-focus-border.py), and
# xrender --no-use-damage full-screen repaints were a glitch source over RDP.
exec --no-startup-id sh -c 'nitrogen --restore; sleep 1; if [ -z "$XRDP_SESSION" ]; then picom -b; fi'

# tray applications
exec --no-startup-id nm-applet
exec --no-startup-id xfce4-power-manage
exec --no-startup-id pamac-tray
exec --no-startup-id clipit
# region screenshot — enters a "screenshot" i3 mode (shown in the bar like
# resize) and launches a quickshell PanelWindow selector (grab-only → file +
# clipboard). The overlay handles the MOUSE (drag / tap two corners); the
# keyboard actions are i3 mode bindings since a dock layer can't get keys.
# See quickshell/qs-screenshot.sh + region/shell.qml + qs-shot-action.sh.
# No `mode default` here — the overlay leaves the mode itself after its
# fade-out (qs-shot-action.sh IPCs into it; its fallback resets the mode).
mode "screenshot" {
    bindsym Escape exec --no-startup-id ~/.dotfiles/quickshell/qs-shot-action.sh cancel
    bindsym w      exec --no-startup-id ~/.dotfiles/quickshell/qs-shot-action.sh whole
}
bindsym $mod+Shift+s mode "screenshot"; exec --no-startup-id ~/.dotfiles/quickshell/qs-screenshot.sh

# lockscreen
exec --no-startup-id xautolock -time 10 -locker blurlock

# dvorak default layout
exec --no-startup-id setxkbmap -device $(xinput list --id-only 'keyboard:AT Translated Set 2 keyboard') -layout us -variant dvorak

# task switcher — action handled by quickshell via xinput key monitor
# (needs to track Super release for confirm; i3 bindsym fires on press only).
# i3 grabs the combos via `nop` so Tab/W don't leak through to the focused
# window (raw XI2 events used by the keymon are below the grab layer).
# Both modifiers named explicitly — NOT via $mod: in xrdp sessions $mod
# resolves to Mod1 and a $mod pair would duplicate the Mod1 lines
# ("Duplicate keybinding" nagbar on connect).
bindsym Mod4+Tab nop
bindsym Mod1+Tab nop
bindsym Mod4+w nop
bindsym Mod1+w nop
