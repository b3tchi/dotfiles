# Platform overlay: native linux + proot (ft003 i3-config-layering)
# Owns: $term, autostart execs, bar. Base config never execs.

## sound tray
exec --no-startup-id volumeicon

# wallpaper + compositor — glx on the console (:0, real GPU); xrender +
# --no-use-damage under xrdp (llvmpipe makes glx a CPU hog; damage
# tracking over xorgxrdp paints windows black — same as wsl.conf)
# picom only on the native session (inactive-dim aesthetic). xrdp runs
# WITHOUT a compositor: its picom existed solely to give the focus border
# ARGB alpha, but the border is shape-based now (qs-focus-border.py), and
# xrender --no-use-damage full-screen repaints were a glitch source over RDP.
exec --no-startup-id sh -c 'nitrogen --restore; sleep 1; if [ -z "$XRDP_SESSION" ]; then picom -b; fi'

# tray applications
exec --no-startup-id nm-applet
exec --no-startup-id xfce4-power-manage
exec --no-startup-id pamac-tray
exec --no-startup-id clipit

# clipboard history (sp016, file-store backend) — backend for the
# $mod+Shift+v picker bound in the base config.
#
# One clip-store.sh loop PER DISPLAY, because adr0004 keeps two X servers
# live at once (native :0 and xrdp :10) and each display's CLIPBOARD can only
# be watched from its own server. Each loop writes a per-display store under
# $XDG_RUNTIME_DIR/clip-store/<display>/; the picker reads the store of the
# session it runs in, and clip-feed.sh bridges copies made on :10 into the
# :0 store so both sessions share one history. The display is passed
# EXPLICITLY on each line — clip-store.sh refuses to trust an ambient
# DISPLAY by design (sp016 anti-pattern; see its header).
#
# All three lines are exec_always and all are safe to re-run on an i3 config
# reload, with no pkill needed:
#   * each clip-store.sh takes a per-display flock and exits 0 when it loses
#     the race, so a reload never yields two loops on one display — and a
#     loop that DIED (crash, display torn down) is restarted by the next
#     reload, which is the recovery path: a dead loop is visible via pgrep
#     and comes back on reload, unlike the silently-deaf daemon it replaced
#     (dotfiles-apl).
#   * clip-feed.sh takes its own flock and exits 0 when it loses. Do NOT
#     wrap any of these in a pkill+restart — the locks live on open file
#     descriptions and a restart racing the old process can leave nothing
#     running at all (see the header of clip-feed.sh).
#
# If XDG_RUNTIME_DIR is unset in the session environment, all three refuse
# loudly (exit 78, EX_CONFIG) rather than fall back to a persistent path.
# Do not swallow that with `|| true` and do not add a fallback — a silent
# fallback would put every copied secret on persistent disk.
#
# A display absent at autostart (xrdp not yet connected) costs one clean
# loop exit; the loop comes back on the next reload once the display is up.
# proot shares this overlay with a single :0 display: its :10 loop exits
# immediately and the feeder idles at CLIP_FEED_IDLE without spawning a
# process (~0% CPU), so the extra lines cost nothing there.
#
# ROLLBACK (one cycle, sp016): copyq/ and clipcat/ stay in-tree with their
# links removed. Restoring a legacy backend = restore its dot.yaml links
# and put its autostart lines back here — each dot.yaml carries its exact
# lines. Neither copyq nor clipcatd is started by any config until then.
exec_always --no-startup-id ~/.i3/scripts/clip-store.sh :0
exec_always --no-startup-id ~/.i3/scripts/clip-store.sh :10
exec_always --no-startup-id ~/.i3/scripts/clip-feed.sh

# lockscreen
exec --no-startup-id xautolock -time 10 -locker blurlock

# dvorak default layout
exec --no-startup-id setxkbmap -device $(xinput list --id-only 'keyboard:AT Translated Set 2 keyboard') -layout us -variant dvorak

# task switcher — action handled by quickshell via xinput key monitor
# (needs to track Super release for confirm; i3 bindsym fires on press only).
# i3 grabs the combos via `nop` so Tab/W don't leak through to the focused
# window (raw XI2 events used by the keymon are below the grab layer).
# Both modifiers named explicitly — NOT via $mod: in xrdp sessions $mod
# resolves to Mod1 and a $mod pair would duplicate the Mod1 lines
# ("Duplicate keybinding" nagbar on connect).
bindsym Mod4+Tab nop
bindsym Mod1+Tab nop
bindsym Mod4+w nop
bindsym Mod1+w nop
