# Platform overlay: native linux + proot (ft003 i3-config-layering)
# Owns: $term, autostart execs, bar. Base config never execs.

## sound tray
exec --no-startup-id volumeicon

# wallpaper + compositor — glx on the console (:0, real GPU); xrender +
# --no-use-damage under xrdp (llvmpipe makes glx a CPU hog; damage
# tracking over xorgxrdp paints windows black — same as wsl.conf)
# picom only on the native session (inactive-dim aesthetic). xrdp runs
# WITHOUT a compositor: its picom existed solely to give the focus border
# ARGB alpha, but the border is shape-based now (qs-focus-border.py), and
# xrender --no-use-damage full-screen repaints were a glitch source over RDP.
exec --no-startup-id sh -c 'nitrogen --restore; sleep 1; if [ -z "$XRDP_SESSION" ]; then picom -b; fi'

# tray applications
exec --no-startup-id nm-applet
exec --no-startup-id xfce4-power-manage
exec --no-startup-id pamac-tray
exec --no-startup-id clipit

# clipboard history (sp014) — backend for the $mod+Shift+v picker bound in
# the base config.
#
# The copyq server runs HERE, on the native display, because adr0004 keeps two
# X servers live at once (native :0 and xrdp :10) and the history has to have
# exactly one home. No DISPLAY is set on either line: this overlay is only ever
# included by the native session, so the inherited DISPLAY already is :0, and a
# plain `copyq` is the client contract from copyq/dot.yaml (its socket lives in
# the config dir, so any environment juggling here would move the socket out
# from under every client).
#
# Both lines are exec_always and both are safe to re-run on an i3 config
# reload, with no pkill needed:
#   * `copyq --start-server` finds the existing server through its socket,
#     prints "CopyQ server is already running", exits 0, and starts nothing.
#   * clip-feed.sh takes an flock and exits 0 when it loses the race, so a
#     second feeder never runs. Do NOT wrap it in a pkill+restart — its lock
#     lives on the open file description and a restart racing the old process
#     can leave no feeder running at all (see the header of clip-feed.sh).
#
# The feeder pushes copies made in the xrdp session (:10) into this :0 history
# so both sessions share one history. WSL has a single display and gets the
# server WITHOUT a feeder (config.d/wsl.conf). proot also has a single display
# but shares this overlay; that costs nothing — clip-feed.sh stats the :10
# socket before every poll, finds nothing, and idles at CLIP_FEED_IDLE without
# spawning a process, so it sits at ~0% CPU rather than needing its own file.
exec_always --no-startup-id copyq --start-server
exec_always --no-startup-id ~/.i3/scripts/clip-feed.sh

# lockscreen
exec --no-startup-id xautolock -time 10 -locker blurlock

# dvorak default layout
exec --no-startup-id setxkbmap -device $(xinput list --id-only 'keyboard:AT Translated Set 2 keyboard') -layout us -variant dvorak

# task switcher — action handled by quickshell via xinput key monitor
# (needs to track Super release for confirm; i3 bindsym fires on press only).
# i3 grabs the combos via `nop` so Tab/W don't leak through to the focused
# window (raw XI2 events used by the keymon are below the grab layer).
# Both modifiers named explicitly — NOT via $mod: in xrdp sessions $mod
# resolves to Mod1 and a $mod pair would duplicate the Mod1 lines
# ("Duplicate keybinding" nagbar on connect).
bindsym Mod4+Tab nop
bindsym Mod1+Tab nop
bindsym Mod4+w nop
bindsym Mod1+w nop
