# Platform overlay: WSL xrdp session (ft003 i3-config-layering, poc002)
# Owns: $term, bar. No compositor (llvmpipe — wasted CPU over RDP), no
# tray apps (no NetworkManager/pamac/battery in WSL), no autolock (RDP
# session), no setxkbmap (layout comes from the RDP client), no
# quickshell (Wayland-leaning; X11 session here).

# $mod = Mod1 here (Alt) — set via "i3wm.mod" X resource in xrdp/xinitrc,
# because vars set in this included file are invisible to the main config.
# Win/Super is captured by the Windows host in windowed RDP.

# quickshell task-switcher nop grabs ($mod resolves Mod1, so just the
# $mod pair — explicit Mod1 lines would duplicate and error)
bindsym $mod+Tab nop
bindsym $mod+w nop

# No compositor. picom used to run here (xrender, --no-use-damage) solely to
# give the quickshell FocusBorder ARGB overlay its alpha — but no-use-damage
# repaints the whole screen on every change (full-frame RDP re-encode =
# visible glitches), and the border is shape-based now (qs-focus-border.py),
# needing no compositor at all.

# clipboard PRIMARY<->CLIPBOARD sync — no clipboard manager runs in WSL/xrdp
# (native.conf gets this from clipit). Without it, select-in-window /
# paste-in-st desyncs: st sets PRIMARY on select but pastes from CLIPBOARD.
# pkill pattern anchored with $ so it matches the running script (cmdline ends
# in clip-sync.sh) but NOT this launcher line (sh -c cmdline ends in &) —
# an unanchored pattern self-matched and killed clip-sync before it started.
exec_always --no-startup-id pkill -f 'clip-sync\.sh$'; ~/.i3/scripts/clip-sync.sh &
