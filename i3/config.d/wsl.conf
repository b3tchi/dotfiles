# Platform overlay: WSL xrdp session (ft003 i3-config-layering, poc002)
# Owns: $term, bar. No compositor (llvmpipe — wasted CPU over RDP), no
# tray apps (no NetworkManager/pamac/battery in WSL), no autolock (RDP
# session), no setxkbmap (layout comes from the RDP client), no
# quickshell (Wayland-leaning; X11 session here).

# terminal for $mod+Return (wm-launch-terminal arg) — st, same as native
set $term st

# Alt as modifier — Win/Super key is captured by the Windows host in
# windowed RDP, so Mod4 binds never reach the session
set $mod Mod1

# quickshell task-switcher nop grabs ($mod = Mod1 here, so just the $mod
# pair — adding explicit Mod1 lines would duplicate and error)
bindsym $mod+Tab nop
bindsym $mod+w nop
