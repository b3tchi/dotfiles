windows:
  links:
    config.yml: ~/AppData/local/lazygit/config.yml

  installs:
    cmd: |
      scoop install lazygit

linux:
  links:
    config.yml: ~/.config/lazygit/config.yml
  installs:
    cmd: |
      {{#if (eq whoami.distro "Manjaro Linux")}}
      sudo pacman -Syu --needed --noconfirm lazygit
      {{/if}}
      {{#if (eq whoami.distro "Arch Linux")}}
      sudo pacman -Syu --needed --noconfirm lazygit
      {{/if}}
      {{#if (eq whoami.distro "Arch Linux ARM")}}
      sudo pacman -Syu --needed --noconfirm lazygit
      {{/if}}
      {{#if (eq env.HOME "/data/data/com.termux/files/home")}}
      pkg install -y lazygit
      {{/if}}
