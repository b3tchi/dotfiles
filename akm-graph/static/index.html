<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Default render backend; ?backend=cosmos|force-graph overrides. The daemon
       may rewrite content= from $AKM_GRAPH_BACKEND at serve time. -->
  <meta name="akm-backend" content="force-graph" />
  <title>akm-graph</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1117; }
    /* graph-root hosts the active engine's canvas: cosmos draws into #canvas;
       force-graph appends its own canvas here. Both fill the viewport. */
    #graph-root { position: absolute; inset: 0; }
    #graph-root canvas { display: block; width: 100%; height: 100%; }
    #canvas { display: block; width: 100%; height: 100%; }
    #tooltip {
      position: absolute;
      display: none;
      background: rgba(13, 17, 23, 0.92);
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 12px;
      color: #e6edf3;
      font-family: 'Iosevka', 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.6;
      pointer-events: none;
      z-index: 100;
      max-width: 260px;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    #tooltip .tip-id   { color: #79c0ff; font-weight: bold; }
    #tooltip .tip-alias { color: #e6edf3; }
    #tooltip .tip-status { color: #8b949e; font-size: 11px; }
    #status {
      position: absolute;
      top: 10px;
      right: 14px;
      color: #8b949e;
      font-family: monospace;
      font-size: 11px;
      pointer-events: none;
    }
    /* Persistent per-node label overlay (name pills, country-borders style). */
    #labels {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 50;
    }
    .node-label {
      position: absolute;
      left: 0; top: 0;
      will-change: transform;
      display: inline-block;
      padding: 1px 6px;
      border-radius: 5px;
      background: rgba(13, 17, 23, 0.82);
      border: 1px solid #30363d;
      border-left-width: 3px;
      color: #e6edf3;
      font-family: 'Iosevka', 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 11px;
      line-height: 1.35;
      white-space: nowrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.5);
      pointer-events: auto;         /* clickable to isolate its neighborhood */
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .node-label.ghost { opacity: 0.55; font-style: italic; }
    .node-label.dim   { opacity: 0.12; }
    .node-label.hidden { display: none; }
    /* Category legend — click a chip to toggle that node type on/off. */
    #legend {
      position: absolute;
      top: 10px;
      left: 14px;
      z-index: 60;
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: calc(100% - 20px);
      overflow-y: auto;
      font-family: 'Iosevka', 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 11px;
    }
    .legend-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 3px 9px 3px 7px;
      border-radius: 5px;
      background: rgba(13, 17, 23, 0.82);
      border: 1px solid #30363d;
      color: #e6edf3;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.12s;
    }
    .legend-chip:hover { border-color: #58627a; }
    .legend-chip.off { opacity: 0.4; }
    .legend-chip.off .legend-swatch { background: transparent !important; }
    .legend-swatch {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex: 0 0 auto;
      border: 1px solid rgba(255,255,255,0.25);
    }
    .legend-name  { flex: 1 1 auto; }
    .legend-count { color: #8b949e; }
  </style>
</head>
<body>
  <div id="graph-root"><canvas id="canvas"></canvas></div>
  <div id="legend"></div>
  <div id="labels"></div>
  <div id="tooltip"></div>
  <div id="status"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
