<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>akm-graph</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1117; }
    #canvas { display: block; width: 100%; height: 100%; }
    #tooltip {
      position: absolute;
      display: none;
      background: rgba(13, 17, 23, 0.92);
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 12px;
      color: #e6edf3;
      font-family: 'Iosevka', 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.6;
      pointer-events: none;
      z-index: 100;
      max-width: 260px;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    #tooltip .tip-id   { color: #79c0ff; font-weight: bold; }
    #tooltip .tip-alias { color: #e6edf3; }
    #tooltip .tip-status { color: #8b949e; font-size: 11px; }
    #status {
      position: absolute;
      top: 10px;
      right: 14px;
      color: #8b949e;
      font-family: monospace;
      font-size: 11px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="tooltip"></div>
  <div id="status"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
