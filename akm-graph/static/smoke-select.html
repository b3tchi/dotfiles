<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>select-smoke pending</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1117; }
    #canvas { display: block; width: 100%; height: 100%; }
    #tooltip { position: absolute; display: none; }
    #labels { position: absolute; inset: 0; }
    .node-label.dim { opacity: 0.12; }
    #status { position: absolute; top: 10px; right: 14px; }
    #result { position: absolute; bottom: 10px; left: 10px; color: #fff; font-family: monospace; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="labels"></div>
  <div id="tooltip"></div>
  <div id="status"></div>
  <div id="result"></div>
  <script type="module" src="./app.js"></script>
  <script type="module">
    // Regression guard for click-isolate: selecting a node must dim the
    // non-neighbor labels while leaving the node's own label lit, and clearing
    // must undim everything.
    const NODE_ID = "us001";
    const wait = (ms) => new Promise((r) => setTimeout(r, ms));

    async function run() {
      const out = document.getElementById("result");
      try {
        for (let t = 0; t < 100 && !window.__akmGraph; t++) await wait(50);
        const g = window.__akmGraph;
        if (!g) throw new Error("__akmGraph never appeared");
        for (let t = 0; t < 100 && !g.nodeById(NODE_ID); t++) await wait(50);
        if (!g.nodeById(NODE_ID)) throw new Error("fixture node " + NODE_ID + " not loaded");
        for (let t = 0; t < 100 && g.dimState().total === 0; t++) await wait(50);

        const before = g.dimState();
        if (before.total < 2) throw new Error("too few labels: " + before.total);
        if (before.dim !== 0) throw new Error("labels dimmed before any selection: " + before.dim);

        g.selectNode(NODE_ID);
        const sel = g.dimState();
        if (sel.dim <= 0) throw new Error("selection dimmed nothing: " + JSON.stringify(sel));
        if (sel.lit < 1) throw new Error("selection lit nothing: " + JSON.stringify(sel));
        if (sel.lit >= sel.total) throw new Error("selection dimmed nothing meaningful: " + JSON.stringify(sel));

        g.clearSelection();
        const cleared = g.dimState();
        if (cleared.dim !== 0) throw new Error("clear left dimmed labels: " + cleared.dim);

        const msg = "SELECT_OK total=" + before.total + " selDim=" + sel.dim + " selLit=" + sel.lit;
        out.textContent = msg;
        document.title = "SELECT_OK";
      } catch (e) {
        out.textContent = "SELECT_FAIL " + e.message;
        document.title = "SELECT_FAIL " + e.message;
      }
    }
    run();
  </script>
</body>
</html>
