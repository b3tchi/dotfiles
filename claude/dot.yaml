linux:
  links:
    settings.json: ~/.claude/settings.json
    statusline.sh: ~/.claude/statusline.sh
    hooks/tmux-waiting.sh: ~/.claude/hooks/tmux-waiting.sh
    hooks/tmux-waiting-simple.sh: ~/.claude/hooks/tmux-waiting-simple.sh
    hooks/tmux-responding.sh: ~/.claude/hooks/tmux-responding.sh
    perles/config.yaml: ~/.config/perles/config.yaml
    repos-health.nu: ~/.local/bin/repos-health.nu
    epic.nu: ~/.local/bin/epic

    {{#if (eq env.HOME "/data/data/com.termux/files/home")}}
    claude-wrapper: /data/data/com.termux/files/usr/bin/claude
    {{/if}}

  installs:
    cmd: |
      # Ensure TMPDIR is set for Claude on Termux
      # dolt — storage backend for bd (server-mode fallback when bd lacks CGO)
      if ! command -v dolt >/dev/null 2>&1; then
        DOLT_VERSION=$(curl -fsSL https://api.github.com/repos/dolthub/dolt/releases/latest 2>/dev/null | grep '"tag_name"' | sed 's/.*"v\(.*\)".*/\1/')
        if [ -n "$DOLT_VERSION" ]; then
          DOLT_ARCH="amd64"
          case "$(uname -m)" in
            aarch64|arm64) DOLT_ARCH="arm64" ;;
          esac
          if curl -fsSL "https://github.com/dolthub/dolt/releases/download/v${DOLT_VERSION}/dolt-linux-${DOLT_ARCH}.tar.gz" -o /tmp/dolt.tar.gz \
             && tar xzf /tmp/dolt.tar.gz -C /tmp/; then
            mkdir -p "$HOME/.local/bin"
            cp "/tmp/dolt-linux-${DOLT_ARCH}/bin/dolt" "$HOME/.local/bin/dolt"
            rm -rf /tmp/dolt.tar.gz /tmp/dolt-linux-*
          fi
        fi
      fi

      # bd (beads) — always reinstall to track upstream version
      curl -fsSL https://raw.githubusercontent.com/gastownhall/beads/main/scripts/install.sh | bash
      if ! command -v bd >/dev/null 2>&1 && [ -x "$HOME/go/bin/bd" ]; then
        mkdir -p "$HOME/.local/bin"
        ln -sf "$HOME/go/bin/bd" "$HOME/.local/bin/bd"
      fi

      # perles — always reinstall to track upstream (catches schema bumps)
      curl -sSL https://raw.githubusercontent.com/zjrosen/perles/main/install.sh | bash
      if ! command -v perles >/dev/null 2>&1 && [ -x "$HOME/go/bin/perles" ]; then
        mkdir -p "$HOME/.local/bin"
        ln -sf "$HOME/go/bin/perles" "$HOME/.local/bin/perles"
      fi

      # bd repo hygiene — only run if invoked from a repo with .beads/
      if [ -d ".beads" ]; then
        bd doctor --fix 2>/dev/null || true
        if [ -z "$(git config beads.role 2>/dev/null)" ]; then
          git config beads.role maintainer
        fi
        bd hooks install 2>/dev/null || true
      fi

      curl -fsSL https://claude.ai/install.sh | sh
      chmod +x ~/.dotfiles/claude/epic.nu

      # LSP servers (binaries) — required by code intelligence plugins
      # nu provides --lsp natively, no extra binary needed
      sudo npm install -g typescript typescript-language-server svelte-language-server vscode-langservers-extracted yaml-language-server

      # markdown-oxide — LSP for wiki vault (used by nvim md plugin + wiki-oxide MCP)
      if ! command -v markdown-oxide >/dev/null 2>&1; then
        if command -v cargo >/dev/null 2>&1; then
          cargo install --locked markdown-oxide
        else
          echo "skip markdown-oxide: cargo not available" >&2
        fi
      fi

      # wiki-oxide MCP — register at user scope, idempotent
      if command -v claude >/dev/null 2>&1; then
        if ! claude mcp list 2>/dev/null | grep -q "^wiki-oxide:"; then
          claude mcp add wiki-oxide -s user -- uv run --quiet --script ~/.dotfiles/claude/mcp/wiki-oxide/server.py
        fi
      fi

      # Plugins
      claude plugin marketplace add JuliusBrussee/caveman
      claude plugin install caveman@caveman
      claude plugin marketplace add anthropics/claude-plugins-official
      claude plugin install skill-creator@claude-plugins-official
      claude plugin install typescript-lsp@claude-plugins-official
      claude plugin marketplace add ~/.dotfiles/claude/marketplace
      claude plugin install svelte-lsp@dotfiles
      claude plugin install nushell-lsp@dotfiles
      claude plugin install json-lsp@dotfiles
      claude plugin install yaml-lsp@dotfiles

      rotz link claude --force
windows:
  links:
    settings.json: ~/.claude/settings.json
