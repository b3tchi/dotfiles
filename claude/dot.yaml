linux:
  links:
    settings.json: ~/.claude/settings.json
    statusline.sh: ~/.claude/statusline.sh
    hooks/tmux-waiting.sh: ~/.claude/hooks/tmux-waiting.sh
    hooks/tmux-waiting-simple.sh: ~/.claude/hooks/tmux-waiting-simple.sh
    hooks/tmux-responding.sh: ~/.claude/hooks/tmux-responding.sh
    perles/config.yaml: ~/.config/perles/config.yaml
    repos-health.nu: ~/.local/bin/repos-health.nu
    epic.nu: ~/.local/bin/epic

    {{#if (eq env.HOME "/data/data/com.termux/files/home")}}
    claude-wrapper: /data/data/com.termux/files/usr/bin/claude
    {{/if}}

  installs:
    depends:
      - claude/beads
    cmd: |
      # Rotz buffers cmd output. Redirect to log file; tail in another pane:
      #   tail -f /tmp/rotz-claude.log
      [ -w /dev/tty ] && echo "rotz claude: tail -f /tmp/rotz-claude.log" >/dev/tty
      exec >>/tmp/rotz-claude.log 2>&1
      set -x
      echo "=== rotz install claude started: $(date) ==="
      # dolt + bd + perles installed via installs.depends → ./beads/dot.yaml

      curl -fsSL https://claude.ai/install.sh | sh
      chmod +x ~/.dotfiles/claude/epic.nu

      # LSP servers (binaries) — required by code intelligence plugins.
      # nu provides --lsp natively, no extra binary needed.
      # Install one-by-one, skip if binary already present.
      # bin → npm pkg map. vscode-langservers-extracted provides 4 binaries; probe one.
      install_lsp() {
        bin="$1"; pkg="$2"
        if command -v "$bin" >/dev/null 2>&1; then
          echo "skip $pkg: $bin present"
        else
          sudo npm install -g "$pkg"
        fi
      }
      install_lsp tsc typescript
      install_lsp typescript-language-server typescript-language-server
      install_lsp svelteserver svelte-language-server
      install_lsp vscode-json-language-server vscode-langservers-extracted
      install_lsp yaml-language-server yaml-language-server

      # markdown-oxide — LSP for wiki vault (used by nvim md plugin + wiki-oxide MCP)
      # Arch extra repo ships prebuilt; cargo fallback for non-Arch.
      if ! command -v markdown-oxide >/dev/null 2>&1; then
        if command -v pacman >/dev/null 2>&1; then
          sudo pacman -Sy --needed --noconfirm markdown-oxide
        elif command -v cargo >/dev/null 2>&1; then
          cargo install --locked --git https://github.com/Feel-ix-343/markdown-oxide.git markdown-oxide
        else
          echo "skip markdown-oxide: no pacman or cargo" >&2
        fi
      fi

      # uv — Python script runner required by wiki-oxide MCP server shebang
      # -Sy refreshes db inline; stale mirrors 404 on cached version pins
      if ! command -v uv >/dev/null 2>&1; then
        if command -v pacman >/dev/null 2>&1; then
          sudo pacman -Sy --needed --noconfirm uv
        else
          curl -LsSf https://astral.sh/uv/install.sh | sh
        fi
      fi

      # wiki-oxide MCP — register at user scope in every CLAUDE_CONFIG_DIR we maintain.
      # Two configs: ~/.claude (work) and ~/.claude-personal (personal). Idempotent.
      if command -v claude >/dev/null 2>&1; then
        for cfg in "$HOME/.claude" "$HOME/.claude-personal"; do
          [ -d "$cfg" ] || continue
          if ! CLAUDE_CONFIG_DIR="$cfg" claude mcp list 2>/dev/null | grep -q "^wiki-oxide:"; then
            CLAUDE_CONFIG_DIR="$cfg" claude mcp add wiki-oxide -s user -- uv run --quiet --script ~/.dotfiles/claude/mcp/wiki-oxide/server.py
          fi
        done
      fi

      # Plugins + marketplaces — apply to every CLAUDE_CONFIG_DIR we maintain.
      # Each config dir keeps its own plugin/marketplace registry; loop both.
      add_marketplace() {
        name="$1"; source="$2"
        if CLAUDE_CONFIG_DIR="$cfg" claude plugin marketplace list 2>/dev/null | grep -q "❯ ${name}$"; then
          echo "skip marketplace ${name} (${cfg}): present"
        else
          CLAUDE_CONFIG_DIR="$cfg" claude plugin marketplace add "$source"
        fi
      }
      install_plugin() {
        spec="$1"  # name@marketplace
        if CLAUDE_CONFIG_DIR="$cfg" claude plugin list 2>/dev/null | grep -q "❯ ${spec}$"; then
          echo "skip plugin ${spec} (${cfg}): present"
        else
          CLAUDE_CONFIG_DIR="$cfg" claude plugin install "$spec"
        fi
      }
      if command -v claude >/dev/null 2>&1; then
        for cfg in "$HOME/.claude" "$HOME/.claude-personal"; do
          [ -d "$cfg" ] || continue
          add_marketplace caveman JuliusBrussee/caveman
          install_plugin caveman@caveman
          add_marketplace claude-plugins-official anthropics/claude-plugins-official
          install_plugin skill-creator@claude-plugins-official
          install_plugin typescript-lsp@claude-plugins-official
          add_marketplace dotfiles ~/.dotfiles/claude/marketplace
          install_plugin svelte-lsp@dotfiles
          install_plugin nushell-lsp@dotfiles
          install_plugin json-lsp@dotfiles
          install_plugin yaml-lsp@dotfiles
        done
      fi

      rotz link claude --force
windows:
  links:
    settings.json: ~/.claude/settings.json
