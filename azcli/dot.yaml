windows:
  installs:
    cmd: |
      scoop install azure-cli
      az extension add --name azure-devops

linux:
  installs:
    cmd: |
      {{#if (eq whoami.distro "Manjaro Linux")}}
      sudo pacman -Syu --needed --noconfirm azure-cli
      {{/if}}
      {{#if (eq whoami.distro "Arch Linux ARM")}}
      sudo pacman -Syu --needed --noconfirm azure-cli
      {{/if}}
      {{#if (eq whoami.distro "Arch Linux")}}
      sudo pacman -Syu --needed --noconfirm azure-cli
      {{/if}}
      az extension add --name azure-devops
