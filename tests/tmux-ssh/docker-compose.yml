services:
  # "local" machine — where the user sits
  local:
    build: .
    hostname: local-machine
    volumes:
      # Mount dotfiles scripts into the container
      - ../../nushell/actions/tmux-from-workstation:/home/testuser/.local/bin/tmux-from-workstation
      - ../../nushell/actions/tmux-to-workstation:/home/testuser/.local/bin/tmux-to-workstation
      - ../../nushell/actions/tmux-ssh:/home/testuser/.local/bin/tmux-ssh
      - ../../tmux/tmux.conf:/home/testuser/.tmux.conf:ro
      - ../../tmux/tmux-thin-local.conf:/home/testuser/.dotfiles/tmux/tmux-thin-local.conf:ro
      - ../../tmux/tmux-thin-remote.conf:/home/testuser/.dotfiles/tmux/tmux-thin-remote.conf:ro
      - ../../tmux/tmux-remote.conf:/home/testuser/.dotfiles/tmux/tmux-remote.conf:ro
      # Shared SSH keys
      - ssh-keys:/shared-keys
    depends_on:
      - remote

  # "remote" machine — the SSH target
  remote:
    build: .
    hostname: remote-machine
    volumes:
      - ssh-keys:/shared-keys
      # Remote needs tmux-start, tmux.conf, bashrc for to-workstation flow
      - ../../distro/actions/tmux-start:/home/testuser/.local/bin/tmux-start
      - ../../tmux/tmux.conf:/home/testuser/.tmux.conf:ro
      - ../../distro/bashrc:/home/testuser/.bashrc:ro

volumes:
  ssh-keys:
