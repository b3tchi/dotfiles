# Replaces: rofi (launcher), dunst (notifications), polybar/waybar (bar)
# Requires: i3 or sway (WM)
linux:
  links:
    config: ~/.config/quickshell
    overlay: ~/.config/quickshell-overlay
  installs:
    cmd: |
      {{#if (eq whoami.distro "Manjaro Linux")}}
      sudo pacman -S --needed --noconfirm quickshell
      {{/if}}
      {{#if (eq whoami.distro "Arch Linux")}}
      sudo pacman -S --needed --noconfirm quickshell
      {{/if}}
      {{#if (eq whoami.distro "Arch Linux ARM")}}
      sudo pacman -S --needed --noconfirm quickshell
      {{/if}}
      rotz link quickshell --force
