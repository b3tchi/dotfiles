# clipcatd.toml -- clipcat backend server config (sp016 task 1, dotfiles-egm.1)
#
# clipcat replaces copyq as the [[ft007]] shared-clipboard-history backend
# (see clipcat/dot.yaml for the full client contract). This file is
# clipcatd's *server* config only, rotz-linked to
# ~/.config/clipcat/clipcatd.toml. clipcatctl and clipcat-menu each read
# their own separate config file by default; every caller in this repo
# skips that entirely and passes --server-endpoint on the command line
# instead, so no clipcatctl.toml / clipcat-menu.toml is checked in here.
#
# Unlike copyq's QSettings .ini files, .toml supports comments and clipcatd
# does not rewrite this file, so the contract can live inline.

# Run detached from the invoking shell so an i3 exec_always line returns
# immediately, exactly as `copyq --start-server` did (task 5's autostart).
# Tests below override this with --no-daemon for a killable, foreground pid.
daemonize = true

# Matches quickshell/qs-clip.sh's own display cap (QS_CLIP_CAP=200) -- no
# point keeping server-side history the picker will never show.
max_history = 200

# MEMORY-ONLY, PART 1 OF 2. This does not stop the daemon from persisting --
# clipcat has no `store_items=false` equivalent (copyq's actual guarantee).
# It only clears whatever the history file already holds at every startup.
# Part 2 (WHERE that file lives) is deliberately not a key in this file --
# see the block below.
clear_history_on_start = true

# Do not mirror CLIPBOARD into PRIMARY or vice versa: clip-set.sh already
# writes both explicitly on publish, and this daemon must not silently
# overwrite an ordinary mouse-selection PRIMARY behind the user's back.
synchronize_selection_with_clipboard = false

# -----------------------------------------------------------------------
# MEMORY-ONLY, PART 2 OF 2 -- history_file_path is DELIBERATELY ABSENT.
#
# copyq guaranteed memory-only as a daemon property: store_items=false,
# nothing ever reached disk, full stop. clipcat has no equivalent switch.
# `history_file_path` is a *directory* (contains a `clips` file and a
# `header.json`), written to CONTINUOUSLY while the session runs -- not
# only at exit -- and if this key is omitted from the config entirely,
# clipcatd defaults it to `$XDG_CACHE_HOME/clipcat`: PERSISTENT DISK.
#
# Worse, this field is a plain TOML string: clipcatd does NOT shell-expand
# it. Writing the literal text "$XDG_RUNTIME_DIR/..." here does not work --
# verified empirically (same behaviour on the analogous `pid_file` key):
# clipcatd creates a directory named literally `$XDG_RUNTIME_DIR` in the
# working directory and then fails outright, it does not fall back to
# anything.
#
# The only correct way to get memory-only history is a shell that resolves
# $XDG_RUNTIME_DIR itself, BEFORE clipcatd ever sees the value, passed as a
# CLI flag that overrides this file:
#
#   clipcatd -c clipcatd.toml --history-file "$XDG_RUNTIME_DIR/clipcat/history"
#
# under `set -u`, so an unset $XDG_RUNTIME_DIR aborts the *launching shell*
# with an unbound-variable error before clipcatd ever runs -- it must never
# silently fall back to the persistent default above. Every launcher of
# this daemon (this task's test-clipcat.sh, and task 5's i3 autostart
# lines) MUST pass --history-file exactly like this. `clear_history_on_start
# = true` above is the other half of the guarantee: even if a launcher gets
# the path right but the daemon has to restart mid-session, it restarts
# empty.
#
# This is why memory-only is CONFIG (and launcher) DISCIPLINE here, not a
# daemon guarantee: a launcher that forgets --history-file persists every
# clip to $XDG_CACHE_HOME silently, with no error from clipcatd at all.
# -----------------------------------------------------------------------

[log]
emit_journald = true
emit_stdout = false
emit_stderr = false
level = "INFO"

[watcher]
# Text only, per ft007 scope. Images/rich clipboard are out of scope and
# must be skipped by the watcher, not crash it.
enable_clipboard = true
enable_primary = false
enable_secondary = false
capture_image = false

# Matched by EXACT atom name, no prefix normalisation (poc010 Q1). Neither
# spelling below has been verified against a real password-manager emitter
# on this host (sp015 / dotfiles-cyg is the actual fix for that gap) --
# both forms are listed so whichever turns out to be real, the drop fires.
sensitive_mime_types = [
  "x-kde-passwordManagerHint",
  "application/x-kde-passwordManagerHint",
]

filter_text_min_length = 1
filter_text_max_length = 20000000
denied_text_regex_patterns = []

[grpc]
# Local socket only -- no TCP listener, one less thing exposed on a
# secrets-adjacent daemon. `local_socket` is also left unset here: when
# absent, clipcatd computes `$XDG_RUNTIME_DIR/clipcat/grpc.sock` itself via
# a real environment lookup at startup (NOT a literal string substitution
# like history_file_path above), so leaving it out is safe by construction.
# Task 5's multi-display autostart overrides it per-display with
# --grpc-socket-path, since one clipcatd binds exactly one socket and the
# native host runs two displays (adr0004).
enable_http = false
enable_local_socket = true

[dbus]
# Not consumed by anything in this repo -- one less service exposed.
enable = false

[metrics]
enable = false

[desktop_notification]
enable = false
