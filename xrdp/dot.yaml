# xrdp — full i3 desktop over RDP for WSL2 (validated in poc002)
# Rendering is llvmpipe only — NEVER set GALLIUM_DRIVER=d3d12 in the
# session: GLX presents black, EGL crashes, and it poisons /dev/dxg for
# the whole VM (poc001 + poc002).
#
# LAN access (mirrored networking) needs firewall rules — admin PowerShell:
#   New-NetFirewallHyperVRule -DisplayName "WSL xrdp" -Direction Inbound `
#     -VMCreatorId '{40E0AC32-46A5-438A-A0B2-2B479E8F2E90}' `
#     -Protocol TCP -LocalPorts 3391
#   New-NetFirewallRule -DisplayName "WSL xrdp LAN" -Direction Inbound `
#     -Protocol TCP -LocalPort 3391 -Action Allow -Profile Private `
#     -RemoteAddress LocalSubnet
#
# TLS deliberately not configured yet (security_layer=negotiate, bundled
# key) — fine for localhost/trusted LAN; add cert + security_layer=tls
# before exposing wider.
#
# Connect: mstsc /v:<host-ip>:3391 — session type Xorg, Linux credentials.
# GUI apps from tmux shells need DISPLAY=:10 and GDK_BACKEND=x11 (tmux
# server env lacks the session display; GTK otherwise escapes to WSLg).
#
# Sessions are exclusive: `wsl-wm-switch i3|sway|status` flips between
# sway-session (WSLg user unit) and xrdp services. Install does NOT
# auto-enable xrdp — run the switch explicitly.
linux:
  links:
    xinitrc: ~/.xinitrc

  installs:
    cmd: |
      {{#if (eq whoami.distro "Arch Linux")}}
      # runtime WSL check (env.WSL_DISTRO_NAME unreliable: unset in
      # sessions spawned outside wsl.exe — tmux server, sway/WSLg, ssh)
      yay -Syu --needed --noconfirm xrdp xorgxrdp xorg-xrdb
      if [ -d /mnt/c ]; then
        # WSL: port 3391 (avoid Windows host RDP 3389 clash) + RFX-first.
        sudo sed -i '0,/^port=3389$/s//port=3391/' /etc/xrdp/xrdp.ini
        # RFX before H.264: H264 4:2:0 chroma subsampling washes out flat UI
        # colors; RFX is 4:4:4 full color (fine on localhost/LAN bandwidth).
        # H.264 kept as fallback for clients without RFX.
        sudo sed -i 's/order = \[ "H.264", "RFX" \]/order = [ "RFX", "H.264" ]/' /etc/xrdp/gfx.toml
      fi
      # Arch native: port stays 3389, default codec order (no flip).
      {{/if}}
      {{#if (eq whoami.distro "Manjaro Linux")}}
      # Native: AUR via pamac; port stays 3389 (no Windows host RDP clash).
      # Codec order kept at upstream default (H.264 first) — preferred on
      # this box; the RFX-first flip is a wsl-only fix for 4:2:0 washout.
      pamac build --no-confirm xrdp xorgxrdp
      {{/if}}
      rotz link xrdp --force
