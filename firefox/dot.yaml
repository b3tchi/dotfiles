# Firefox — per-display profiles (dotfiles-dc1).
#
# A profile is a set of SQLite DBs guarded by .parentlock, so one profile
# cannot back two concurrent Firefox processes. Where two X servers share a
# $HOME — native :0 and the xrdp virtual Xorg :10 — a single profile means the
# second launch hands its URL to the first instance over DBus and the window
# opens on the wrong display. `ff` routes by $DISPLAY: :10 -> rdp, everything
# else (native :0, WSLg wayland, Xwayland) -> home.
#
# Only non-SQLite, read-at-startup files are linked in. NEVER link *.sqlite,
# sessionstore*, lock/.parentlock, or a whole profile dir — concurrent writers
# corrupt them, which is exactly what the lock exists to prevent. Share live
# state (bookmarks, history, open tabs) between the two via Firefox Sync.
linux:
  links:
    ff: ~/.local/bin/ff
    ff.desktop: ~/.local/share/applications/ff.desktop
    user.js:
      - ~/.mozilla/firefox/home/user.js
      - ~/.mozilla/firefox/rdp/user.js
    chrome/userChrome.css:
      - ~/.mozilla/firefox/home/chrome/userChrome.css
      - ~/.mozilla/firefox/rdp/chrome/userChrome.css

  installs:
    cmd: |
      {{#if (eq whoami.distro "Manjaro Linux")}}
      sudo pacman -Syu --needed --noconfirm firefox
      {{/if}}
      {{#if (eq whoami.distro "Arch Linux")}}
      sudo pacman -Syu --needed --noconfirm firefox
      {{/if}}
      chmod +x ~/.local/bin/ff

      # Refresh the MIME cache so ff.desktop is offered as a handler.
      update-desktop-database ~/.local/share/applications 2>/dev/null || true

      # Make ff the default browser -- but NOT on WSL, where wsl/dot.yaml
      # installs its own ~/.local/bin/xdg-open forwarding links to the
      # Windows browser via Start-Process. That wrapper shadows the real
      # xdg-open on PATH and never consults .desktop files, so setting a
      # default here would be inert and misleading. Runtime check, not
      # template eval (see CLAUDE.md).
      if [ ! -d /mnt/c ]; then
        xdg-settings set default-web-browser ff.desktop || true
      fi
