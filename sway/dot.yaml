linux:
  links:
    config: ~/.config/sway/config
    config.d: ~/.config/sway/config.d
    ../i3/config.rasi: ~/.config/rofi/config.rasi
    ../waybar/config.jsonc: ~/.config/waybar/config.jsonc
    ../waybar/style.css: ~/.config/waybar/style.css
    # WSL-specific links (wrapped as full key-value pairs)
    {{#if env.WSL_DISTRO_NAME}}
    wsl/sway-session.sh: ~/.local/bin/sway-session
    wsl/sway-session.service: ~/.config/systemd/user/sway-session.service
    profiles.yaml: ~/.config/sway/profiles.yaml
    scripts/sway-profile.nu: ~/.local/bin/sway-profile
    scripts/clipboard-to-win.nu: ~/.local/bin/clipboard-to-win
    scripts/clipboard-to-win-image.ps1: ~/.local/bin/clipboard-to-win-image.ps1
    scripts/win-to-clipboard.nu: ~/.local/bin/win-to-clipboard
    scripts/win-clipboard-monitor.ps1: ~/.local/bin/win-clipboard-monitor.ps1
    wsl/win-to-clipboard.service: ~/.config/systemd/user/win-to-clipboard.service
    {{/if}}

  installs:
    cmd: |
      {{#if env.WSL_DISTRO_NAME}}
      {{#if (eq whoami.distro "Arch Linux")}}
      sudo pacman -Syu --needed --noconfirm \
        sway \
        foot \
        swaybg \
        xorg-xwayland \
        wl-clipboard \
        waybar
      systemctl --user daemon-reload
      systemctl --user enable sway-session
      {{/if}}
      {{/if}}
      rotz link sway --force
