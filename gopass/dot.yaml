linux:
  installs:
    cmd: |
      {{#if (eq whoami.distro "Arch Linux")}}
      sudo pacman -S --needed --noconfirm gopass age openssh
      {{/if}}
      {{#if (eq whoami.distro "Manjaro Linux")}}
      sudo pacman -S --needed --noconfirm gopass age openssh
      {{/if}}
      {{#if (eq whoami.distro "Arch Linux ARM")}}
      sudo pacman -S --needed --noconfirm gopass age openssh
      {{/if}}
      {{#if (eq env.HOME "/data/data/com.termux/files/home")}}
      pkg install gopass age openssh
      {{/if}}

      # create gopass age passphrase file if missing
      # runtime WSL check (env.WSL_DISTRO_NAME unreliable: unset in
      # sessions spawned outside wsl.exe — tmux server, sway/WSLg, ssh)
      if [ -d /mnt/c ]; then
        GOPASS_PW_FILE="/mnt/c/Users/jbecka/.gopass-age-password"
      else
        GOPASS_PW_FILE="$HOME/.gopass-age-password"
      fi

      if [ ! -f "$GOPASS_PW_FILE" ]; then
        printf "Enter gopass age passphrase: "
        read -s GOPASS_PW
        echo
        printf "%s" "$GOPASS_PW" > "$GOPASS_PW_FILE"
        if [ ! -d /mnt/c ]; then
          chmod 600 "$GOPASS_PW_FILE"
        fi
        echo "Passphrase saved to $GOPASS_PW_FILE"
      fi
