#tmux conf
set -g status-interval 5
set-hook -g client-detached 'run-shell "~/.local/bin/tmux-cleanup"'
set-hook -g after-select-window 'run-shell "~/.local/bin/tmux-cleanup"'

if-shell '[ -n "$TERMUX_VERSION" ]' {
  set-option -g default-shell /data/data/com.termux/files/usr/bin/nu
} {
  set-option -g default-shell /usr/sbin/nu
}

bind r source-file ~/.tmux.conf \; run-shell "~/.local/bin/tmux-message 'Config reloaded'"


# Pin/Unpin toggle for panes (uses @pinned pane option)
bind P if-shell '[ "$(tmux show-option -pqv @pinned)" = "1" ]' \
    'set-option -p @pinned 0; run-shell "~/.local/bin/tmux-message \"Pane unpinned\""' \
    'set-option -p @pinned 1; run-shell "~/.local/bin/tmux-message \"Pane pinned\""'

# Fuzzy window switcher with preview
bind w display-popup -E -w 90% -h 90% "~/.local/bin/tmux-session-picker windows #{client_tty}"

# Fuzzy session switcher with preview (all windows across sessions)
bind s display-popup -E -w 90% -h 90% "~/.local/bin/tmux-session-picker sessions #{client_tty}"

# Project picker (fzf popup to switch/create project sessions)
bind p display-popup -E -w 60% -h 60% "~/.local/bin/tmux-project"

# Remote session control (used with txs/tmux-ssh)
# prefix e — detach from remote session (keep it alive)
bind e run-shell 'HOST="#{@ssh_remote_host}"; \
  [ -z "$HOST" ] && exit 0; \
  PORT="#{@ssh_remote_port}"; \
  SESSION="#{@ssh_remote_session}"; \
  ssh ${PORT:+-p $PORT} "$HOST" "tmux -L remote detach-client -s $SESSION"'

# prefix E — kill remote session and disconnect
bind E run-shell 'HOST="#{@ssh_remote_host}"; \
  [ -z "$HOST" ] && exit 0; \
  PORT="#{@ssh_remote_port}"; \
  SESSION="#{@ssh_remote_session}"; \
  ssh ${PORT:+-p $PORT} "$HOST" "tmux -L remote kill-session -t $SESSION"'

# prefix X — kill all unattached remote sessions on current pane's host
bind X run-shell 'HOST="#{@ssh_remote_host}"; \
  [ -z "$HOST" ] && exit 0; \
  PORT="#{@ssh_remote_port}"; \
  for s in $(ssh ${PORT:+-p $PORT} "$HOST" "tmux -L remote list-sessions -F \"#{session_name}:#{session_attached}\"" 2>/dev/null | grep ":0$" | cut -d: -f1); do \
    ssh ${PORT:+-p $PORT} "$HOST" "tmux -L remote kill-session -t $s"; \
  done'

# Pass sway/wayland env vars through to new panes
set -ga update-environment SWAYSOCK
set -ga update-environment I3SOCK
set -ga update-environment WAYLAND_DISPLAY

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# Enable RGB colour if running in xterm(1)
set-option -sa terminal-overrides ",xterm*:Tc"

set -g set-titles on
set -g set-titles-string "#{?@ssh_host,[#{pane_title}]#{@ssh_host} @#{session_group} #{s/@//:window_id},#{?#{==:#{pane_current_command},claude},#{?@waiting,(?) ,}#{s/^. //:pane_title} - #{pane_current_command}@#{session_group} #{s/@//:window_id},#{s|#{HOME}|~|:pane_current_path} - #{pane_current_command}@#{session_group} #{s/@//:window_id}}}"

set -g history-limit 10000

set -g mouse on

setw -g mode-keys vi

set -g set-clipboard on
set -g allow-passthrough all

# Copy-mode → system clipboard. set-clipboard's OSC52 reaches foot/ssh, but
# st (xrdp i3 session) has no OSC52 support, so pipe to a real clipboard tool
# too: wl-copy on Wayland, xclip on X11 (xrdp :10 → xrdp-chansrv → Windows).
# Falls through to OSC52 alone where neither tool/display exists (dotfiles-0ak).
CLIP='if [ -n "$WAYLAND_DISPLAY" ] && command -v wl-copy >/dev/null; then wl-copy; elif [ -n "$DISPLAY" ] && command -v xclip >/dev/null; then xclip -selection clipboard -i; else cat >/dev/null; fi'
bind -T copy-mode-vi y     send -X copy-pipe-and-cancel "sh -c '$CLIP'"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "sh -c '$CLIP'"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "sh -c '$CLIP'"

# Message settings
set -g message-style bg=black
set -g display-time 800

# Status bar settings
set -g status on
set -g status-position bottom
set -g status-style bg=black
set -g status-left "#{?#{==:#{@pinned},1},#[fg=colour208],#[default]}#W#[default]@#{session_group}#{?@ssh_remote_session, #[fg=white][#{@ssh_remote_session}],}"
set -g status-left-length 40
set -g status-right "#I"
set -g window-status-format ""
set -g window-status-current-format ""
set -g status-justify left
