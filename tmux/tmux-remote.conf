# Minimal tmux config for remote persistence sessions (socket: remote)
# No keybindings, no status bar — just keep the session alive

if-shell '[ -n "$TERMUX_VERSION" ]' {
  set-option -g default-shell /data/data/com.termux/files/usr/bin/nu
} {
  set-option -g default-shell /usr/sbin/nu
}

set -g status off
set -g prefix None
unbind-key -a
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set-option -sa terminal-overrides ",xterm*:Tc"
set -g history-limit 10000
set -g mouse on
set -g set-clipboard on
set -g allow-passthrough all
