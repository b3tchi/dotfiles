# Meta-package: WSL with sway (WSLg, Wayland)
# Usage: rotz install meta-wsl-sway
# Sets sway as the active WSL session via wsl-wm-switch.
depends:
  - distro
  - nushell
  - tmux
  - nvim
  - lazygit
  - d2
  - ssh
  - glab
  - azcli
  - claude
  - opencode
  - quickshell
  - docker

installs:
  # prerequisites of the switch cmd: wsl links wsl-wm-switch,
  # sway provides the session being enabled
  depends:
    - wsl
    - sway
  cmd: |
    ~/.local/bin/wsl-wm-switch sway
