linux:
  links:
    doom: ~/.config/doom
  installs:
    cmd: |
      {{#if (eq whoami.distro "Manjaro Linux")}}
      sudo pacman -Syu --needed --noconfirm emacs
      {{/if}}
      {{#if (eq whoami.distro "Arch Linux")}}
      sudo pacman -Syu --needed --noconfirm emacs
      {{/if}}
      rotz link emacs --force
windows:
  links:
    doom: ~/AppData/Roaming/.doom.d
