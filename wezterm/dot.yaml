windows:
  links:
    wezterm.lua: ~\.config\wezterm\wezterm.lua

  installs: winget install wez.wezterm

linux:
  links:
    wezterm.lua: ~/.config/wezterm/wezterm.lua

  installs:
    cmd: |
      {{#if (eq whoami.distro "Manjaro Linux")}}
      sudo pacman -Syu --needed --noconfirm wezterm
      {{/if}}
      {{#if (eq whoami.distro "Arch Linux")}}
      sudo pacman -Syu --needed --noconfirm wezterm
      {{/if}}
      {{#if (eq whoami.distro "Manjaro Linux")}}
      test -d ~/.config/wezterm/wezterm-session-manager || git clone https://github.com/danielcopper/wezterm-session-manager.git ~/.config/wezterm/wezterm-session-manager
      {{/if}}
      {{#if (eq whoami.distro "Arch Linux")}}
      test -d ~/.config/wezterm/wezterm-session-manager || git clone https://github.com/danielcopper/wezterm-session-manager.git ~/.config/wezterm/wezterm-session-manager
      {{/if}}
      rotz link wezterm --force
