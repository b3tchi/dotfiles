windows:
  links:
    config.nu: ~/AppData/Roaming/nushell/config.nu
    env.nu: ~/AppData/Roaming/nushell/env.nu
    scripts: ~/AppData/Roaming/nushell/scripts
    apps: ~/AppData/Roaming/nushell/apps
    starship.toml: ~/.config/starship.toml
    actions/tmux-cleanup: ~/.local/bin/tmux-cleanup
    actions/tmux-start: ~/.local/bin/tmux-start
    actions/tmux-message: ~/.local/bin/tmux-message
    actions/tmux-project: ~/.local/bin/tmux-project
    actions/tmux-ssh: ~/.local/bin/tmux-ssh
    actions/tmux-session-cleaner: ~/.local/bin/tmux-session-cleaner
    actions/wm-launch-terminal: ~/.local/bin/wm-launch-terminal

  installs:
    cmd: |
      scoop install nu
      scoop install starship
      scoop bucket add extras
      scoop install extras/carapace-bin

linux:
  links:
    config.nu: ~/.config/nushell/config.nu
    env.nu: ~/.config/nushell/env.nu
    scripts: ~/.config/nushell/scripts
    apps: ~/.config/nushell/apps
    starship.toml: ~/.config/starship.toml
    actions/tmux-cleanup: ~/.local/bin/tmux-cleanup
    actions/tmux-start: ~/.local/bin/tmux-start
    actions/tmux-message: ~/.local/bin/tmux-message
    actions/tmux-project: ~/.local/bin/tmux-project
    actions/tmux-ssh: ~/.local/bin/tmux-ssh
    actions/wm-current-workspace: ~/.local/bin/wm-current-workspace
    actions/wm-ipc.nu: ~/.local/bin/wm-ipc.nu
    actions/ws-list.nu: ~/.local/bin/ws-list.nu
    actions/ws-switch.nu: ~/.local/bin/ws-switch.nu
    actions/project-picker: ~/.local/bin/project-picker
    actions/tmux-session-picker: ~/.local/bin/tmux-session-picker
    actions/wm-state: ~/.local/bin/wm-state
    actions/cleanup-thins: ~/.local/bin/cleanup-thins
    actions/tmux-to-workstation: ~/.local/bin/tmux-to-workstation
    actions/tmux-session-cleaner: ~/.local/bin/tmux-session-cleaner
    actions/wm-launch-terminal: ~/.local/bin/wm-launch-terminal
    actions/d2-router: ~/.local/bin/d2-router
    actions/akm-graph: ~/.local/bin/akm-graph
    actions/preview: ~/.local/bin/preview
  installs:
    cmd: |
      {{#if (eq env.HOME "/data/data/com.termux/files/home")}}
      pkg install -y nushell starship carapace
      {{/if}}
      {{#if (eq whoami.distro "Manjaro Linux")}}
      sudo pacman -Syu --needed --noconfirm \
        nushell starship
      pamac install carapace-bin --no-confirm
      {{/if}}
      {{#if (eq whoami.distro "Arch Linux")}}
      sudo pacman -Syu --needed --noconfirm \
        nushell starship
      yay -S --needed --noconfirm carapace-bin
      {{/if}}
      {{#if (eq whoami.distro "Arch Linux ARM")}}
      sudo pacman -Syu --needed --noconfirm \
        nushell starship
      yay -S --needed --noconfirm carapace-bin
      {{/if}}
      chmod +x ~/.dotfiles/nushell/actions/tmux-cleanup
      chmod +x ~/.dotfiles/nushell/actions/tmux-start
      chmod +x ~/.dotfiles/nushell/actions/tmux-message
      chmod +x ~/.dotfiles/nushell/actions/tmux-project
      chmod +x ~/.dotfiles/nushell/actions/tmux-ssh
      chmod +x ~/.dotfiles/nushell/actions/wm-current-workspace
      chmod +x ~/.dotfiles/nushell/actions/wm-ipc.nu
      chmod +x ~/.dotfiles/nushell/actions/ws-list.nu
      chmod +x ~/.dotfiles/nushell/actions/ws-switch.nu
      chmod +x ~/.dotfiles/nushell/actions/project-picker
      chmod +x ~/.dotfiles/nushell/actions/tmux-session-picker
      chmod +x ~/.dotfiles/nushell/actions/wm-state
      chmod +x ~/.dotfiles/nushell/actions/cleanup-thins
      chmod +x ~/.dotfiles/nushell/actions/tmux-to-workstation
      chmod +x ~/.dotfiles/nushell/actions/tmux-session-cleaner
      chmod +x ~/.dotfiles/nushell/actions/wm-launch-terminal
      chmod +x ~/.dotfiles/nushell/actions/d2-router
      chmod +x ~/.dotfiles/nushell/actions/preview
      # WSL: curated Windows exe symlinks — env.nu puts ~/.local/bin/win on
      # PATH instead of System32 (4000+ files would pollute completions).
      # Runtime kernel check, not env.WSL_DISTRO_NAME — that var is unset in
      # sessions spawned outside wsl.exe (tmux server, sway/WSLg, ssh).
      if uname -r | grep -q 'microsoft-standard-WSL'; then
        mkdir -p ~/.local/bin/win
        ln -sf /mnt/c/WINDOWS/system32/wsl.exe ~/.local/bin/win/wsl.exe
        ln -sf /mnt/c/WINDOWS/system32/cmd.exe ~/.local/bin/win/cmd.exe
        ln -sf /mnt/c/WINDOWS/explorer.exe ~/.local/bin/win/explorer.exe
        ln -sf /mnt/c/WINDOWS/system32/clip.exe ~/.local/bin/win/clip.exe
        ln -sf /mnt/c/WINDOWS/system32/notepad.exe ~/.local/bin/win/notepad.exe
        ln -sf '/mnt/c/WINDOWS/System32/WindowsPowerShell/v1.0/powershell.exe' ~/.local/bin/win/powershell.exe
      fi
      rotz link nushell --force
