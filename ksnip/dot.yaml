# ksnip — screenshot annotation editor (native linux desktop).
# NOT used for capture anymore — that's quickshell/qs-screenshot.sh (region
# selector → file + clipboard). ksnip is kept only to annotate a saved shot on
# demand: `ksnip -e <file>`. Launched manually; quits on close (single-instance
# + tray disabled in ksnip.conf).
#
# qt6ct.conf styles the editor dark (Fusion + darker palette + Iosevka), scoped
# to ksnip via the platform theme — launch dark with:
#   QT_QPA_PLATFORMTHEME=qt6ct ksnip -e <file>
# (nothing sets that env globally, so other Qt apps are unaffected).
#
# ksnip.conf is linked but ksnip rewrites it on use (recent files, window
# geometry) — expect occasional churn; re-strip the volatile groups if they
# pile up.
linux:
  links:
    qt6ct.conf: ~/.config/qt6ct/qt6ct.conf
    ksnip.conf: ~/.config/ksnip/ksnip.conf
  installs:
    cmd: |
      {{#if (eq whoami.distro "Manjaro Linux")}}
      sudo pacman -Syu --needed --noconfirm ksnip qt6ct
      {{/if}}
      {{#if (eq whoami.distro "Arch Linux")}}
      sudo pacman -Syu --needed --noconfirm ksnip qt6ct
      {{/if}}
      rotz link ksnip --force
