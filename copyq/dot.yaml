# copyq — DECOMMISSIONED clipboard-history backend, kept in-tree as ROLLBACK
# LAYER 1 for one cycle (sp016 task 5, dotfiles-egm.5).
#
# ft007's backend is now the bespoke clipnotify file store (clip-store/,
# i3/scripts/clip-store.sh — the sp016 pivot, poc012). This dot links
# NOTHING and no i3 config starts a copyq server any more. The files
# (copyq.conf, commands.ini, test-copyq.sh) and the install stanza below
# stay in-tree so the backend can be flipped back on if the store fails in
# daily use; delete this whole directory once it proves out.
#
# ROLLBACK — to restore copyq as the backend:
#   1. Uncomment the `links:` block below (restores both ini links).
#   2. Put the autostart lines back in the i3 overlays:
#        i3/config.d/native.conf:  exec_always --no-startup-id copyq --start-server
#                                  (plus ~/.i3/scripts/clip-feed.sh, already there)
#        i3/config.d/wsl.conf:     exec_always --no-startup-id copyq --start-server
#      and remove the clip-store.sh lines they replaced.
#   3. `rotz install copyq` (installs the package and re-runs the link).
#   Note: clip-feed.sh has since been rewritten to write store files, not
#   `copyq add` — a full copyq rollback also needs the pre-sp016 feeder
#   (git history has it; sp014 task 2 / dotfiles-92w.2).
#
# --- Original header (sp014 task 1, dotfiles-92w.1) follows, kept verbatim
# --- because it documents the contracts the rollback would restore:
#
# The clipboard-history server behind the quickshell picker. Consumed by the
# cross-display feeder (task .2), the paste script (task .3), the quickshell
# history browser (task .4) and the i3 autostart/keybind wiring (task .5).
#
# ===========================================================================
# CONTRACT FOR DOWNSTREAM TASKS — read this before writing a copyq client
# ===========================================================================
#
# 1. Talk to the server with a plain `copyq <cmd>`. No environment juggling.
#
#    copyq creates its server socket (`.copyq_s`) *inside its config dir*, so
#    anything that moves the config dir also moves the socket and breaks every
#    client that does not re-export the same XDG_CONFIG_HOME. That is why the
#    memory-only behaviour below is NOT implemented by pointing
#    XDG_CONFIG_HOME at a tmpfs path (an approach evaluated and rejected):
#    the config dir stays at the standard ~/.config/copyq, clients stay
#    env-free, and the autostart is a plain `copyq --start-server`.
#
# 2. History is memory-only, via `store_items=false` on the &clipboard tab
#    (copyq.conf `[Tabs]`). Items live in the running server's memory and die
#    with it — logout clears history, and nothing reaches disk. Verified on
#    copyq 16.0.0 by copyq/test-copyq.sh, including a 3 MB item (well over
#    `item_data_threshold`, which would otherwise spill a large item into its
#    own file next to the tab data).
#
#    There is no copyq option that disables saving globally; `store_items` is
#    a *per-tab* property. If a second tab is ever added, it needs its own
#    `N\store_items=false` or that tab will persist to disk.
#
# 3. Password-manager copies are dropped by the automatic command in
#    commands.ini, matching `Input=application/x-kde-passwordManagerHint`
#    with `Remove=true`.
#
#    This rule is the ONLY thing standing between a KeePassXC copy and the
#    history. copyq 16.0.0 has NO native handling of that atom — the string
#    does not appear anywhere in the binary or its plugins, and with the rule
#    removed a hint-bearing clipboard change IS captured in full (that is an
#    asserted negative control in test-copyq.sh, not an assumption). Do not
#    "simplify" the rule away.
#
# 4. Neither ini file may contain comments. Both are Qt QSettings files;
#    copyq rewrites them in place and QSettings does not support comment
#    lines — a `#` line survives a rewrite as a percent-encoded garbage key
#    (observed). That is why this documentation lives here in dot.yaml, which
#    rotz reads but nothing rewrites.
#
#    copyq writes *through* the rotz symlinks rather than replacing them, so
#    the links survive. commands.ini is committed in copyq's own canonical
#    serialization (our rule as entry 1, plus copyq's six built-in pinned/tag
#    plugin commands, `size=7`) precisely so the first server start has
#    nothing to write back and leaves no dirty git diff.
#
# WHO STARTS THE SERVER (sp014 task 5). Nothing here does — this dot.yaml only
# installs copyq and links its two ini files. The server is autostarted by the
# i3 platform overlay, `exec_always --no-startup-id copyq --start-server`:
#
#   i3/config.d/native.conf   server on :0 (+ i3/scripts/clip-feed.sh, which
#                             feeds the xrdp display's copies into it)
#   i3/config.d/wsl.conf      server on the single WSL display, no feeder
#
# It lives in the overlay rather than the base i3 config because adr0004 gives
# the native host two live X servers and the history must have exactly one
# home; the base config only carries the $mod+Shift+v picker keybind, which is
# platform-independent.
#
# `--start-server` is idempotent, which is what makes exec_always safe across
# i3 config reloads: a second invocation reaches the running server over the
# socket, prints "CopyQ server is already running" and exits 0 without starting
# a second one. Verified on copyq 16.0.0 by i3/scripts/test-clip-integration.sh.
#
# Test: copyq/test-copyq.sh (headless, Xvfb; does not touch the live session
# or ~/.config/copyq).
# DECOMMISSIONED: the links are commented out, NOT deleted — they are the
# exact set the rollback above restores (uncomment to re-enable):
#
#   links:
#     copyq.conf: ~/.config/copyq/copyq.conf
#     # copyq's commands store is `copyq-commands.ini`; the repo-side name is
#     # the plainer `commands.ini` (same repo-name/target-name split as
#     # i3/dot.yaml's i3status.conf -> ~/.config/i3status/config).
#     commands.ini: ~/.config/copyq/copyq-commands.ini
linux:
  installs:
    cmd: |
      {{#if (eq whoami.distro "Manjaro Linux")}}
      sudo pacman -S --needed --noconfirm copyq xclip
      {{/if}}
      {{#if (eq whoami.distro "Arch Linux")}}
      sudo pacman -S --needed --noconfirm copyq xclip
      {{/if}}
      {{#if (eq whoami.distro "Arch Linux ARM")}}
      sudo pacman -S --needed --noconfirm copyq xclip
      {{/if}}
      # DECOMMISSIONED: `rotz link copyq --force` removed with the links
      # block above; restore both together on rollback.
