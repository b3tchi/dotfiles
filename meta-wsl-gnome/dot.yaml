# Meta-package: WSL with full GNOME desktop over RDP (headless Wayland — im005)
# Usage: rotz install meta-wsl-gnome
# Full GNOME + Forge i3-like tiling, served headless over RDP on port 3390.
# Coexists with i3+xrdp (3391) — NOT exclusive, so it does NOT call
# wsl-wm-switch. gnome-rdp (a dependency) owns the session unit + grd + vgem.
depends:
  - distro
  - nushell
  - tmux
  - nvim
  - lazygit
  - d2
  - ssh
  - glab
  - azcli
  - claude
  - opencode
  - docker

installs:
  # gnome-rdp provides the headless-RDP session mechanism (unit + grd + vgem);
  # this meta layers the full GNOME desktop + Forge tiling on top.
  depends:
    - wsl
    - gnome-rdp
  cmd: |
    {{#if (eq whoami.distro "Arch Linux")}}
    # runtime WSL check (env.WSL_DISTRO_NAME unreliable in tmux/WSLg/ssh)
    if [ -d /mnt/c ]; then
      # full GNOME desktop (group, ~58 pkgs) + tweaks
      sudo pacman -Syu --needed --noconfirm gnome gnome-tweaks
      # Forge — i3/sway-like tree tiling (AUR). Super is grabbed by the RDP
      # client, so dynamic tiling matters more than a dock here.
      yay -Syu --needed --noconfirm gnome-shell-extension-forge
      # enable Forge in the headless GNOME session (appends to the gsettings
      # list; fallback sets it directly if gnome-extensions is unavailable)
      gnome-extensions enable forge@jmmaranan.com 2>/dev/null || \
        gsettings set org.gnome.shell enabled-extensions "['forge@jmmaranan.com']"
      # reload the running session so Forge takes effect (no-op if not started)
      systemctl --user restart gnome-rdp-session 2>/dev/null || true
    fi
    {{/if}}
